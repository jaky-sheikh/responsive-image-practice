<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Image</title>
    <style>
      img {
        max-width: 100%;
        height: auto;
      }
      .pic {
        width: 100%;
        max-width: 500px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <div class="pic">
      <img src="pic1.jpg" alt="" />
    </div>
  </body>
</html>
