<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        gap: 10px;
      }
      .one {
        flex: 1;
        border: 1px solid black;
        background-color: gray;
        border-radius: 5px;
        text-align: center;
        min-height: 200px;
      }
      .two {
        flex: 3;
        border: 1px solid black;
        background-color: rgb(223, 199, 199);
        border-radius: 5px;
        text-align: center;
        min-height: 400px;
      }
      .one,
      .two {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      @media screen and (max-width: 576px) {
        .container {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="one">
        <h2>Left</h2>
      </div>
      <div class="two">
        <h2>Right</h2>
      </div>
    </div>
  </body>
</html>
